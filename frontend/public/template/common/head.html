<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <!-- Head Fragment -->
  <head th:fragment="head">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ===============================================-->
    <!--    Document Title-->
    <!-- ===============================================-->
    <title>ShopEasy OMS</title>

    <!-- ===============================================-->
    <!--    Favicons-->
    <!-- ===============================================-->
    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicons/favicon-16x16.png">
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicons/favicon.ico">
    <link rel="manifest" href="/img/favicons/manifest.json">
    <meta name="msapplication-TileImage" content="/img/favicons/mstile-150x150.png">
    <meta name="theme-color" content="#ffffff">
    <script src="/vendors/simplebar/simplebar.min.js"></script>
    <script src="/js/config.js"></script>

    <!-- ===============================================-->
    <!--    Stylesheets-->
    <!-- ===============================================-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/vendors/simplebar/simplebar.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
    <link href="/css/theme-rtl.min.css" type="text/css" rel="stylesheet" id="style-rtl">
    <link href="/css/theme.min.css" type="text/css" rel="stylesheet" id="style-default">
    <link href="/css/user-rtl.min.css" type="text/css" rel="stylesheet" id="user-style-rtl">
    <!-- ===============================================-->
    <!--    Tabulator CSS (공통) - Semantic UI Theme-->
    <!-- ===============================================-->
    <link href="/vendors/tabulator/tabulator_semanticui.min.css" rel="stylesheet" id="tabulator-semanticui-css">
    <link href="/css/user.css" type="text/css" rel="stylesheet" id="user-style-default">
    
    <!-- Choices.js (검색 가능한 Select) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/styles/choices.min.css">
    
    <!-- 상품 셋트 구성품 스타일 (상품 페이지에서만 사용) -->
    <link href="/css/product-set-items.css" type="text/css" rel="stylesheet">
    
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script>
      var phoenixIsRTL = window.config.config.phoenixIsRTL;
      if (phoenixIsRTL) {
        var linkDefault = document.getElementById('style-default');
        var userLinkDefault = document.getElementById('user-style-default');
        linkDefault.setAttribute('disabled', true);
        userLinkDefault.setAttribute('disabled', true);
        document.querySelector('html').setAttribute('dir', 'rtl');
      } else {
        var linkRTL = document.getElementById('style-rtl');
        var userLinkRTL = document.getElementById('user-style-rtl');
        linkRTL.setAttribute('disabled', true);
        userLinkRTL.setAttribute('disabled', true);
      }

      // 다크모드 감지 및 Tabulator Midnight CSS 로드
      function isDarkMode() {
        const theme = document.documentElement.getAttribute('data-bs-theme');
        if (theme === 'dark') {
          return true;
        }
        if (theme === 'auto') {
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        return false;
      }

      function toggleTabulatorTheme() {
        const darkMode = isDarkMode();
        const semanticuiLink = document.getElementById('tabulator-semanticui-css');
        let midnightLink = document.getElementById('tabulator-midnight-css');

        if (darkMode) {
          // 다크모드: semanticui 비활성화, midnight 활성화
          if (semanticuiLink) {
            semanticuiLink.disabled = true;
          }
          if (!midnightLink) {
            midnightLink = document.createElement('link');
            midnightLink.id = 'tabulator-midnight-css';
            midnightLink.rel = 'stylesheet';
            midnightLink.href = '/vendors/tabulator/tabulator_midnight.min.css';
            document.head.appendChild(midnightLink);
          } else {
            midnightLink.disabled = false;
          }
        } else {
          // 라이트모드: semanticui 활성화, midnight 비활성화
          if (semanticuiLink) {
            semanticuiLink.disabled = false;
          }
          if (midnightLink) {
            midnightLink.disabled = true;
          }
        }
      }

      // 초기 테마 설정
      toggleTabulatorTheme();

      // 다크모드 변경 감지
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.type === 'attributes' && mutation.attributeName === 'data-bs-theme') {
            toggleTabulatorTheme();
          }
        });
      });

      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-bs-theme']
      });

      // 시스템 다크모드 변경 감지 (auto 모드일 때)
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      mediaQuery.addEventListener('change', function() {
        if (document.documentElement.getAttribute('data-bs-theme') === 'auto') {
          toggleTabulatorTheme();
        }
      });
    </script>
  </head>
</html>
