    <script th:inline="javascript">
      window.APP_CONFIG = window.APP_CONFIG || {};
      window.APP_CONFIG.devMode = [[${@environment.getProperty('app.dev-mode', 'false')}]];
      
      // 전역 메시지 객체 초기화 (모든 메시지 프로퍼티를 JavaScript에서 사용 가능)
      // th:inline="none"을 사용하여 Thymeleaf의 자동 이스케이프를 방지하고 JSON을 직접 출력
      try {
        var messagesJson = /*[[${allMessagesJson}]]*/ '{}';
        window.MESSAGES = JSON.parse(messagesJson);
      } catch (e) {
        window.MESSAGES = {};
        console.warn('Failed to parse messages JSON:', e);
        console.warn('Messages JSON string:', messagesJson);
      }
    </script>

    <style>
      /* Vertical Navbar일 때 Top Navbar의 메뉴 숨김 */
      html[data-navigation-type="vertical"] #navbarTopCollapse {
        display: none !important;
        visibility: hidden !important;
      }
      
      /* Horizontal Navbar일 때 Vertical Navbar 숨김 */
      html[data-navigation-type="horizontal"] #navbarVertical {
        display: none !important;
        visibility: hidden !important;
      }
      
      /* Horizontal Navbar일 때 Top Navbar의 메뉴 표시 */
      html[data-navigation-type="horizontal"] #navbarTopCollapse {
        display: flex !important;
        visibility: visible !important;
      }
      
      /* Horizontal Navbar 메뉴 아이템 높이 통일 및 세로 정렬 */
      html[data-navigation-type="horizontal"] .navbar-nav-top .nav-item .nav-link {
        min-height: 3.5rem; /* 56px */
        display: flex;
        align-items: center;
        padding-top: 0.75rem; /* 12px */
        padding-bottom: 0.75rem; /* 12px */
      }
      
      /* Content 영역 구분선 제거 */
      .content {
        border: none !important;
        padding-top: 66px !important;
        padding-left: 0px !important;
        padding-right: 0px !important;
        padding-bottom: 0px !important;
      }
      
      /* Horizontal Navbar일 때 Content 영역의 왼쪽 여백 제거 */
      /* Phoenix CSS의 모든 선택자보다 우선순위를 높이기 위해 더 구체적인 선택자 사용 */
      html[data-navigation-type="horizontal"] .navbar-vertical.navbar-expand-xxl ~ .navbar-top ~ .content,
      html[data-navigation-type="horizontal"] .navbar-vertical.navbar-expand-xl ~ .navbar-top ~ .content,
      html[data-navigation-type="horizontal"] .navbar-vertical.navbar-expand-lg ~ .navbar-top ~ .content,
      html[data-navigation-type="horizontal"] .navbar-vertical.navbar-expand-md ~ .navbar-top ~ .content,
      html[data-navigation-type="horizontal"] .navbar-vertical.navbar-expand-sm ~ .navbar-top ~ .content,
      html[data-navigation-type="horizontal"] .navbar-vertical.navbar-expand-xs ~ .navbar-top ~ .content,
      html[data-navigation-type="horizontal"] .navbar-vertical ~ .content,
      html[data-navigation-type="horizontal"] .content {
        margin-left: 0 !important;
      }
      
      /* Vertical Navbar일 때 Content 영역의 왼쪽 여백 유지 (Phoenix 기본값) */
      html[data-navigation-type="vertical"] .content {
        margin-left: var(--phoenix-navbar-vertical-width, 254px) !important;
      }
      
      /* Tab 스타일 */
      .tab-container {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      
      /* Bootstrap .nav-tabs 기본 스타일 사용, 최소한의 커스텀 스타일만 추가 */
      #dynamicTabsList {
        flex-shrink: 0;
        padding: 0.5rem 1rem 0 2.5rem;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
      }
      
      /* 탭 리스트 스크롤바 스타일 */
      #dynamicTabsList::-webkit-scrollbar {
        height: 4px;
      }
      
      #dynamicTabsList::-webkit-scrollbar-track {
        background: transparent;
      }
      
      #dynamicTabsList::-webkit-scrollbar-thumb {
        background: var(--phoenix-border-color);
        border-radius: 2px;
      }
      
      #dynamicTabsList::-webkit-scrollbar-thumb:hover {
        background: var(--phoenix-text-body-tertiary);
      }
      
      #dynamicTabsList .nav-item {
        margin-right: 0.25rem;
        flex-shrink: 0;
      }
      
      /* Bootstrap .nav-tabs .nav-link 기본 스타일 유지, 필요한 부분만 오버라이드 */
      #dynamicTabsList.nav-tabs .nav-link {
        display: flex;
        align-items: center;
        white-space: nowrap;
        width: auto !important; /* 탭 너비를 내용에 맞게 자동 조정 */
        min-width: auto !important;
        max-width: none !important;
      }
      
      /* 이미지 스타일: 활성 탭은 파란색 배경에 흰색 텍스트, 비활성 탭은 흰색 배경에 파란색 텍스트 */
      
      /* 비활성 탭: 흰색 배경에 파란색 텍스트 */
      #dynamicTabsList.nav-tabs .nav-link:not(.active) {
        background-color: #ffffff !important;
        color: #3874ff !important;
        border: 1px solid var(--phoenix-border-color) !important;
        border-bottom: 1px solid var(--phoenix-border-color) !important;
        border-bottom-left-radius: 0.375rem !important;
        border-bottom-right-radius: 0.375rem !important;
      }
      
      #dynamicTabsList.nav-tabs .nav-link:not(.active) *,
      #dynamicTabsList.nav-tabs .nav-link:not(.active) .tab-title {
        color: #3874ff !important;
      }
      
      /* 활성 탭: 파란색 배경에 흰색 텍스트 */
      #dynamicTabsList.nav-tabs .nav-link.active {
        background-color: #3874ff !important;
        color: #ffffff !important;
        border: 1px solid #3874ff !important;
        border-bottom: 1px solid #3874ff !important;
        border-bottom-left-radius: 0.375rem !important;
        border-bottom-right-radius: 0.375rem !important;
        margin-bottom: 0;
        position: relative;
        z-index: 10;
      }
      
      #dynamicTabsList.nav-tabs .nav-link.active *,
      #dynamicTabsList.nav-tabs .nav-link.active .tab-title {
        color: #ffffff !important;
      }
      
      /* 닫기 아이콘 색상 조정 */
      #dynamicTabsList.nav-tabs .nav-link.active .tab-close-icon,
      #dynamicTabsList.nav-tabs .nav-link.active .tab-close-icon svg {
        color: #ffffff !important;
        stroke: #ffffff !important;
      }
      
      #dynamicTabsList.nav-tabs .nav-link:not(.active) .tab-close-icon,
      #dynamicTabsList.nav-tabs .nav-link:not(.active) .tab-close-icon svg {
        color: #3874ff !important;
        stroke: #3874ff !important;
      }
      
      /* 탭 리스트 하단 테두리 제거 */
      #dynamicTabsList.nav-tabs {
        border-bottom: none !important;
      }
      
      /* 탭 너비를 내용에 맞게 자동 조정 */
      html[data-navigation-type="vertical"] #dynamicTabsList .nav-link,
      html[data-navigation-type="horizontal"] #dynamicTabsList .nav-link {
        max-width: none !important;
        min-width: auto !important;
        width: auto !important;
      }
      
      #dynamicTabsList .nav-link .tab-icon {
        display: flex;
        align-items: center;
        margin-right: 0.5rem;
        flex-shrink: 0;
      }
      
      #dynamicTabsList .nav-link .tab-icon svg {
        width: 14px;
        height: 14px;
      }
      
      #dynamicTabsList .nav-link .tab-title {
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }
      
      /* 닫기 버튼을 아이콘으로 변경 */
      #dynamicTabsList .nav-link .btn-close {
        display: none;
      }
      
      #dynamicTabsList .nav-link .tab-close-icon {
        opacity: 0.5;
        padding: 0.25rem;
        margin-left: 0.25rem !important; /* 텍스트와 닫기 아이콘 간격 줄이기 */
        flex-shrink: 0;
        cursor: pointer;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      #dynamicTabsList .nav-link:hover .tab-close-icon {
        opacity: 1;
      }
      
      #dynamicTabsContent {
        flex: 1;
        overflow: auto;
        padding: 0rem;
      }
      
      #dynamicTabsContent .tab-pane {
        height: 100%;
        display: none !important;
      }
      
      #dynamicTabsContent .tab-pane.show.active {
        display: block !important;
      }
      
      .default-content {
        display: block;
      }
      
      /* Tab 컨테이너가 활성화되면 기본 콘텐츠 숨김 */
      .tab-container.active ~ .default-content {
        display: none !important;
      }
      
      /* Tab 컨테이너가 활성화되면 표시 */
      .tab-container.active {
        display: flex !important;
      }
      
      /* Tab 컨테이너가 비활성화되면 기본 콘텐츠 표시 */
      .tab-container:not(.active) {
        display: none !important;
      }
      
      .tab-container:not(.active) ~ .default-content {
        display: block !important;
      }
      
      /* Tabulator 커스텀 스타일은 이제 /vendors/tabulator/tabulator_semanticui.min.css 파일에 포함되어 있습니다. */
      /* 모든 그리드에 자동으로 적용됩니다. */
      
      /* 서브 메뉴 아이콘 크기 조정 (상위 메뉴보다 작게) */
      .parent .nav-link .nav-link-icon,
      .parent-wrapper .nav-link .nav-link-icon {
        width: 14px !important;
        height: 14px !important;
        margin-right: 0.5rem !important; /* 아이콘과 텍스트 간격 줄이기 */
      }
      
      .parent .nav-link .nav-link-icon svg,
      .parent-wrapper .nav-link .nav-link-icon svg {
        width: 14px !important;
        height: 14px !important;
      }
      
      /* 서브 메뉴 텍스트의 padding-left 제거 */
      .navbar-nav .nav .nav-link .nav-link-text {
        padding-left: 0px !important;
      }
    </style>
    <script>
      // Feather icons 초기화
      if (typeof feather !== 'undefined') {
        feather.replace();
      }
      
      // 레이아웃 전환 처리
      function updateLayout(navbarPosition) {
        // HTML 요소에 data-navigation-type 속성 설정
        if (navbarPosition === 'horizontal') {
          document.documentElement.setAttribute('data-navigation-type', 'horizontal');
        } else {
          document.documentElement.setAttribute('data-navigation-type', 'vertical');
        }
        
        // Theme Customizer의 라디오 버튼 상태 업데이트
        const verticalRadio = document.getElementById('navbarPositionVertical');
        const horizontalRadio = document.getElementById('navbarPositionHorizontal');
        if (verticalRadio && horizontalRadio) {
          if (navbarPosition === 'horizontal') {
            horizontalRadio.checked = true;
          } else {
            verticalRadio.checked = true;
          }
        }
        
        // 레이아웃 토글 버튼 아이콘 업데이트
        const layoutToggleIcon = document.getElementById('layoutToggleIcon');
        if (layoutToggleIcon) {
          if (navbarPosition === 'horizontal') {
            layoutToggleIcon.setAttribute('data-feather', 'sidebar');
          } else {
            layoutToggleIcon.setAttribute('data-feather', 'layout');
          }
          if (typeof feather !== 'undefined') {
            feather.replace();
          }
        }
      }
      
      // 초기 레이아웃 설정
      (function() {
        const navbarPosition = localStorage.getItem('phoenixNavbarPosition') || 'vertical';
        updateLayout(navbarPosition);
      })();
      
      // 드롭다운 메뉴가 열릴 때 Feather 아이콘 초기화
      document.addEventListener('DOMContentLoaded', function() {
        // Bootstrap 드롭다운 이벤트 리스너 (상단 메뉴)
        document.addEventListener('shown.bs.dropdown', function(event) {
          // 드롭다운이 열릴 때 해당 드롭다운 내부의 Feather 아이콘 초기화
          const dropdown = event.target.closest('.dropdown');
          if (dropdown && typeof feather !== 'undefined') {
            const dropdownMenu = dropdown.querySelector('.dropdown-menu');
            if (dropdownMenu) {
              // 드롭다운 메뉴 내부의 [data-feather] 요소들만 선택하여 초기화
              const featherElements = dropdownMenu.querySelectorAll('[data-feather]');
              featherElements.forEach(function(el) {
                // 이미 SVG로 변환된 경우 제거하고 다시 초기화
                const parent = el.parentElement;
                if (parent && parent.querySelector('svg.feather')) {
                  const svg = parent.querySelector('svg.feather');
                  if (svg) {
                    svg.remove();
                  }
                }
              });
              // Feather 아이콘 초기화
              feather.replace();
            }
          }
        });
        
        // Bootstrap Collapse 이벤트 리스너 (좌측 메뉴)
        document.addEventListener('shown.bs.collapse', function(event) {
          // 좌측 메뉴의 하위 메뉴가 열릴 때 해당 메뉴 내부의 Feather 아이콘 초기화
          const collapseElement = event.target;
          if (collapseElement && collapseElement.classList.contains('parent') && typeof feather !== 'undefined') {
            // 하위 메뉴 내부의 [data-feather] 요소들만 선택하여 초기화
            const featherElements = collapseElement.querySelectorAll('[data-feather]');
            featherElements.forEach(function(el) {
              // 이미 SVG로 변환된 경우 제거하고 다시 초기화
              const parent = el.parentElement;
              if (parent && parent.querySelector('svg.feather')) {
                const svg = parent.querySelector('svg.feather');
                if (svg) {
                  svg.remove();
                }
              }
            });
            // Feather 아이콘 초기화
            feather.replace();
          }
        });
        
        // 초기 로드 시에도 Feather 아이콘 초기화
        if (typeof feather !== 'undefined') {
          feather.replace();
        }
      });
      
      // 레이아웃 토글 버튼 클릭 이벤트
      document.addEventListener('DOMContentLoaded', function() {
        const layoutToggleBtn = document.getElementById('layoutToggleBtn');
        if (layoutToggleBtn) {
          layoutToggleBtn.addEventListener('click', function() {
            const currentPosition = localStorage.getItem('phoenixNavbarPosition') || 'vertical';
            const newPosition = currentPosition === 'horizontal' ? 'vertical' : 'horizontal';
            
            // localStorage에 저장
            localStorage.setItem('phoenixNavbarPosition', newPosition);
            
            // phoenix.js의 config도 업데이트
            if (window.config && window.config.set) {
              window.config.set({ phoenixNavbarPosition: newPosition });
            }
            
            // 레이아웃 업데이트
            updateLayout(newPosition);
          });
        }
      });
      
      // 법인 선택 함수
      function changeCorporation(corporationCd) {
        // 빈 값이면 경고 표시하고 이전 값으로 되돌리기
        if (!corporationCd || corporationCd.trim() === '') {
          showWarningAlert('법인을 선택하세요.');
          // 드롭다운을 이전 값으로 되돌리기
          const selectElement = document.getElementById('corporationSelect');
          if (selectElement) {
            const previousValue = selectElement.getAttribute('data-previous-value') || '';
            selectElement.value = previousValue;
          }
          return;
        }
        
        // AJAX로 법인 선택 처리 - fetch API 사용
        const formData = new URLSearchParams();
        formData.append('corporationCd', corporationCd);
        
        fetch('/api/corporation/select', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: formData
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          if (data.success) {
            // 성공 시 페이지 새로고침 (세션 업데이트 반영하여 선택된 법인의 상품만 표시)
            location.reload();
          } else {
            Swal.fire({
              icon: 'error',
              title: '오류',
              text: data.message || '법인 선택에 실패했습니다.'
            });
            // 실패 시 이전 값으로 되돌리기
            const selectElement = document.getElementById('corporationSelect');
            if (selectElement) {
              const previousValue = selectElement.getAttribute('data-previous-value') || '';
              selectElement.value = previousValue;
            }
          }
        })
        .catch(error => {
          console.error('Error:', error);
          Swal.fire({
            icon: 'error',
            title: '오류',
            text: '법인 선택 중 오류가 발생했습니다.'
          });
          // 실패 시 이전 값으로 되돌리기
          const selectElement = document.getElementById('corporationSelect');
          if (selectElement) {
            const previousValue = selectElement.getAttribute('data-previous-value') || '';
            selectElement.value = previousValue;
          }
        });
      }
      
      // 페이지 로드 시 세션의 선택된 법인으로 드롭다운 설정
      document.addEventListener('DOMContentLoaded', function() {
        const corporationSelect = document.getElementById('corporationSelect');
        if (corporationSelect) {
          // Thymeleaf로 전달된 세션 값 확인
          const selectedCorpCd = /*[[${session.selectedCorporation?.corporation_cd}]]*/ null;
          
          // 법인 목록을 세션 스토리지에 저장 (탭 전환 시 복원용)
          const corporationList = /*[[${session.corporationList}]]*/ null;
          if (corporationList && Array.isArray(corporationList)) {
            sessionStorage.setItem('shopeasy_corporationList', JSON.stringify(corporationList));
          }
          if (selectedCorpCd) {
            sessionStorage.setItem('shopeasy_selectedCorporation', selectedCorpCd);
            corporationSelect.value = selectedCorpCd;
          }
          
          // 변경 전 값을 저장 (오류 시 되돌리기 위해)
          corporationSelect.setAttribute('data-previous-value', corporationSelect.value);
          
          // 변경 이벤트 발생 시 이전 값 저장 및 세션 스토리지 업데이트
          corporationSelect.addEventListener('change', function() {
            this.setAttribute('data-previous-value', this.value);
            if (this.value) {
              sessionStorage.setItem('shopeasy_selectedCorporation', this.value);
            } else {
              sessionStorage.removeItem('shopeasy_selectedCorporation');
            }
          });
        }
      });
      
      // 전역 fetch API 인터셉터: 모든 fetch 요청에 대해 세션 만료 체크
      (function() {
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          return originalFetch.apply(this, args)
            .then(response => {
              // 401 Unauthorized 응답 처리 (세션 만료)
              if (response.status === 401) {
                // 응답 본문을 읽기 전에 복제 (한 번만 읽을 수 있음)
                const clonedResponse = response.clone();
                return clonedResponse.json()
                  .then(data => {
                    if (data && data.sessionExpired) {
                      // 세션 만료 처리
                      if (typeof handleSessionExpired === 'function') {
                        handleSessionExpired();
                      } else if (typeof Swal !== 'undefined') {
                        Swal.fire({
                          icon: 'warning',
                          title: '세션 만료',
                          text: '세션이 만료되었습니다. 다시 로그인해주세요.',
                          confirmButtonText: '로그인 페이지로 이동',
                          allowOutsideClick: false,
                          allowEscapeKey: false
                        }).then(() => {
