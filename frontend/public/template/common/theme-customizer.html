<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <!-- Theme Customizer Fragment -->
  <div class="offcanvas offcanvas-end settings-panel border-0" id="settings-offcanvas" tabindex="-1" aria-labelledby="settings-offcanvas" th:fragment="theme-customizer">
    <div class="offcanvas-header align-items-start border-bottom flex-column border-translucent">
      <div class="pt-1 w-100 mb-6 d-flex justify-content-between align-items-start">
        <div>
          <h5 class="mb-2 me-2 lh-sm"><span class="fas fa-palette me-2 fs-8"></span>Theme Customizer</h5>
          <p class="mb-0 fs-9">Explore different styles according to your preferences</p>
        </div>
        <button class="btn p-1 fw-bolder" type="button" data-bs-dismiss="offcanvas" aria-label="Close">
          <span class="fas fa-times fs-8"></span>
        </button>
      </div>
      <button class="btn btn-phoenix-secondary w-100" data-theme-control="reset">
        <span class="fas fa-arrows-rotate me-2 fs-10"></span>Reset to default
      </button>
    </div>
    <div class="offcanvas-body scrollbar px-card" id="themeController">
      <div class="setting-panel-item mt-0">
        <h5 class="setting-panel-item-title">Color Scheme</h5>
        <div class="row gx-2">
          <div class="col-4">
            <input class="btn-check" id="themeSwitcherLight" name="theme-color" type="radio" value="light" data-theme-control="phoenixTheme" />
            <label class="btn d-inline-block btn-navbar-style fs-9" for="themeSwitcherLight">
              <span class="mb-2 rounded d-block">
                <img class="img-fluid img-prototype mb-0" src="/img/generic/default-light.png" alt="" />
              </span>
              <span class="label-text">Light</span>
            </label>
          </div>
          <div class="col-4">
            <input class="btn-check" id="themeSwitcherDark" name="theme-color" type="radio" value="dark" data-theme-control="phoenixTheme" />
            <label class="btn d-inline-block btn-navbar-style fs-9" for="themeSwitcherDark">
              <span class="mb-2 rounded d-block">
                <img class="img-fluid img-prototype mb-0" src="/img/generic/default-dark.png" alt="" />
              </span>
              <span class="label-text">Dark</span>
            </label>
          </div>
          <div class="col-4">
            <input class="btn-check" id="themeSwitcherAuto" name="theme-color" type="radio" value="auto" data-theme-control="phoenixTheme" />
            <label class="btn d-inline-block btn-navbar-style fs-9" for="themeSwitcherAuto">
              <span class="mb-2 rounded d-block">
                <img class="img-fluid img-prototype mb-0" src="/img/generic/auto.png" alt="" />
              </span>
              <span class="label-text">Auto</span>
            </label>
          </div>
        </div>
      </div>
      <div class="setting-panel-item">
        <h5 class="setting-panel-item-title">Navigation Type</h5>
        <div class="row gx-2">
          <div class="col-6">
            <input class="btn-check" id="navbarPositionVertical" name="navigation-type" type="radio" value="vertical" data-theme-control="phoenixNavbarPosition" />
            <label class="btn d-inline-block btn-navbar-style fs-9" for="navbarPositionVertical">
              <span class="rounded d-block">
                <img class="img-fluid img-prototype d-dark-none" src="/img/generic/default-light.png" alt="" />
                <img class="img-fluid img-prototype d-light-none" src="/img/generic/default-dark.png" alt="" />
              </span>
              <span class="label-text">Vertical</span>
            </label>
          </div>
          <div class="col-6">
            <input class="btn-check" id="navbarPositionHorizontal" name="navigation-type" type="radio" value="horizontal" data-theme-control="phoenixNavbarPosition" />
            <label class="btn d-inline-block btn-navbar-style fs-9" for="navbarPositionHorizontal">
              <span class="rounded d-block">
                <img class="img-fluid img-prototype d-dark-none" src="/img/generic/top-default.png" alt="" />
                <img class="img-fluid img-prototype d-light-none" src="/img/generic/top-default-dark.png" alt="" />
              </span>
              <span class="label-text">Horizontal</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</html>
